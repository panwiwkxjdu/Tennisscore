<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, shrink-to-fit=yes">
        <title>Tennis Scoreboard Pro · Судья / Зритель</title>
        <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    input, select, textarea {
      -webkit-user-select: text;
      user-select: text;
    }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: linear-gradient(135deg, #e8ecf1 0%, #dce1e8 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      overflow: hidden;
    }
    .app-container {
      width: 100%;
      max-width: 1100px;
      height: 92vh;
      max-height: 900px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 48px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.12), 0 0 0 1px rgba(255,255,255,0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .nav-tabs {
      display: flex;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      padding: 10px 20px;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      z-index: 10;
    }
    .nav-tab {
      background: transparent;
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #3a3a3c;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      white-space: nowrap;
      letter-spacing: -0.01em;
    }
    .nav-tab.active {
      background: #007aff;
      color: #fff;
      box-shadow: 0 6px 16px rgba(0,122,255,0.35);
      transform: scale(1.02);
    }
    .page {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow-y: auto;
      padding: 20px;
      animation: fadeSlide 0.25s ease;
    }
    .page.active {
      display: flex;
    }
    @keyframes fadeSlide {
      from { opacity: 0.5; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: #ffffff;
      border-radius: 32px;
      padding: 28px 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.04);
      width: 100%;
      max-width: 720px;
      margin: auto;
    }
    .card h2, .card h3 {
      font-weight: 650;
      margin-bottom: 18px;
      color: #1c1c1e;
      letter-spacing: -0.02em;
    }
    .name-input {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid #e5e5ea;
      border-radius: 20px;
      font-size: 1rem;
      margin: 8px 0;
      background: #fafafa;
      transition: 0.2s;
      outline: none;
      font-family: inherit;
    }
    .name-input:focus {
      border-color: #007aff;
      box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
      background: #fff;
    }
    .action-btn {
      background: #f2f2f6;
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1c1c1e;
      letter-spacing: -0.01em;
    }
    .action-btn.primary {
      background: #007aff;
      color: white;
      box-shadow: 0 4px 14px rgba(0,122,255,0.3);
    }
    .action-btn.danger {
      background: #ff3b30;
      color: white;
    }
    .action-btn.success {
      background: #34c759;
      color: white;
    }
    .action-btn:active {
      transform: scale(0.95);
      opacity: 0.85;
    }
    .tournament-header {
      background: #1c1c1e;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 600;
      border-radius: 28px 28px 0 0;
      letter-spacing: -0.02em;
    }
    .big-scoreboard {
      background: white;
      padding: 16px 10px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      border-radius: 0 0 28px 28px;
    }
    .half {
      cursor: pointer;
      flex: 1;
      text-align: center;
      padding: 12px 8px;
      border-radius: 28px;
      transition: 0.15s;
    }
    .half:active {
      background: rgba(0,122,255,0.06);
      transform: scale(0.97);
    }
    .team-name {
      font-size: 1.3rem;
      font-weight: 650;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .serve-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #30d158;
      box-shadow: 0 0 12px #30d158;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.5; transform:scale(0.8); }
    }
    .sets-num {
      font-size: 2.6rem;
      font-weight: 700;
      color: #007aff;
      font-feature-settings: "tnum";
      letter-spacing: -0.03em;
    }
    .games-num {
      font-size: 1.5rem;
      font-weight: 600;
      background: #f2f2f6;
      padding: 4px 16px;
      border-radius: 24px;
      display: inline-block;
      margin: 4px 0;
    }
    .points-num {
      font-size: 3.8rem;
      font-weight: 700;
      color: #1c1c1e;
      line-height: 1.1;
      letter-spacing: -0.04em;
    }
    .vs-divider {
      font-size: 1.6rem;
      font-weight: 500;
      color: #8e8e93;
      padding: 0 6px;
    }
    .info-panel {
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      background: #f9f9fb;
      border-radius: 28px;
      margin: 10px 0;
    }
    .match-status {
      font-weight: 550;
      background: #fff;
      padding: 8px 20px;
      border-radius: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.2s;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .modal {
      background: white;
      border-radius: 36px;
      padding: 24px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 30px 50px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal button {
      background: #f2f2f6;
      border: none;
      padding: 14px;
      border-radius: 24px;
      font-weight: 590;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.15s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .modal button.primary {
      background: #007aff;
      color: white;
    }
    .modal button.success {
      background: #34c759;
      color: white;
    }
    .stat-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      max-width: 100%;
      border-radius: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 420px;
    }
    th, td {
      padding: 10px 6px;
      border-bottom: 1px solid #e5e5ea;
      text-align: center;
    }
    .search-input {
      width: 100%;
      padding: 14px 20px;
      border-radius: 30px;
      border: 1.5px solid #e5e5ea;
      font-size: 1rem;
      margin-bottom: 16px;
      background: #fafafa;
      outline: none;
    }
    .list-item {
      background: #f8f8fa;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s;
    }
    .list-item:active {
      background: #e8e8ed;
      transform: scale(0.98);
    }
    .role-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin: auto;
    }
    .role-btn {
      width: 200px;
      padding: 24px;
      font-size: 1.5rem;
      font-weight: 650;
      border-radius: 32px;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
      border: none;
    }
    .role-btn:active {
      transform: scale(0.95);
      background: #f0f0f5;
    }
    @media (max-width: 600px) {
      .points-num { font-size: 2.6rem; }
      .sets-num { font-size: 2rem; }
      .team-name { font-size: 1rem; }
      .nav-tab { padding: 8px 14px; font-size: 0.8rem; }
      .role-btn { width: 160px; font-size: 1.2rem; padding: 18px; }
    }
  </style>
      </head>
      <body>
        <div class="app-container" id="appContainer">
          <!-- Навигация (динамическая) -->
          <div class="nav-tabs" id="mainNav" style="display:none;">
          </div>
          <!-- СТАРТОВЫЙ ЭКРАН ВЫБОРА РОЛИ -->
          <div class="page active" id="page-role" style="justify-content:center; align-items:center;">
            <div class="role-card">
              <h2 style="font-size:2rem; margin-bottom:0;">🎾 Теннисное табло</h2>
              <button class="role-btn" id="btnJudge">👨‍⚖️ Я судья</button>
              <button class="role-btn" id="btnSpectator">👀 Я зритель</button>
            </div>
          </div>
          <!-- СУДЬЯ: НАСТРОЙКА МАТЧА -->
          <div class="page" id="page-setup">
            <div class="card">
              <h2>🎾 Новый матч</h2>
              <label>Название турнира</label>
              <input id="setupTournament" class="name-input" placeholder="Уимблдон 2026" value="Турнир">
                <label>Режим</label>
                <select id="setupMode" class="name-input">
                  <option value="single">Одиночный</option>
                  <option value="double">Парный</option>
                  <option value="proam">Pro-Am</option>
                </select>
                <div id="setupPlayers" style="margin:8px 0;">
                </div>
                <button id="startSetupBtn" class="action-btn primary">Далее ➔</button>
                <button id="backToRoleFromSetup" class="action-btn" style="margin-top:8px;">↩️ Сменить роль</button>
              </div>
            </div>
            <!-- СУДЬЯ: ЖРЕБИЙ -->
            <div class="page" id="page-toss">
              <div class="card" style="text-align:center;">
                <h2>🪙 Жребий</h2>
                <div id="coinContainer" style="margin:20px auto; width:100px; height:100px; background:linear-gradient(145deg,#ffd700,#e6c200); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:3rem; box-shadow:0 10px 20px rgba(0,0,0,0.2); cursor:pointer;">🪙</div>
                <p id="tossResultText" style="font-weight:600; margin:8px 0;">Нажмите на монету</p>
                <div id="tossManual" style="display:flex; gap:12px; justify-content:center; margin:16px 0;">
                  <button id="tossLeftBtn" class="action-btn">👈 Левые</button>
                  <button id="tossRightBtn" class="action-btn">👉 Правые</button>
                </div>
                <div id="tossChoicePanel" style="display:none; margin-top:16px;">
                  <p id="tossWinnerName" style="font-weight:600;">
                  </p>
                  <button id="choiceServeBtn" class="action-btn primary">🎾 Подача</button>
                  <button id="choiceReceiveBtn" class="action-btn">🤚 Приём</button>
                  <button id="choiceSideBtn" class="action-btn">🔄 Сторона</button>
                  <div id="playerChoicePanel" style="margin-top:12px;">
                  </div>
                </div>
                <div style="margin-top:20px; display:flex; justify-content:space-between;">
                  <button id="backToSetupBtn" class="action-btn">↩️ Назад к именам</button>
                  <button id="startMatchBtn" class="action-btn primary" style="display:none;">Начать матч 🏁</button>
                </div>
              </div>
            </div>
            <!-- СУДЬЯ: МАТЧ -->
            <div class="page" id="page-match">
              <div class="tournament-header">
                <span>🏆</span>
                <span id="matchTournamentDisplay">Турнир</span>
              </div>
              <div class="big-scoreboard">
                <div class="half" id="matchLeftHalf">
                  <div class="team-name" id="matchLeftName">Игрок 1</div>
                  <div class="sets-num" id="matchLeftSets">0</div>
                  <div class="games-num" id="matchLeftGames">0</div>
                  <div class="points-num" id="matchLeftPoints">0</div>
                </div>
                <div class="vs-divider">VS</div>
                <div class="half" id="matchRightHalf">
                  <div class="team-name" id="matchRightName">Игрок 2</div>
                  <div class="sets-num" id="matchRightSets">0</div>
                  <div class="games-num" id="matchRightGames">0</div>
                  <div class="points-num" id="matchRightPoints">0</div>
                </div>
              </div>
              <div class="info-panel">
                <div class="match-status" id="matchStatusText">🏆 Матч не начат</div>
                <div style="display:flex; gap:8px;">
                  <button id="abortMatchBtn" class="action-btn">✖ Прервать</button>
                  <button id="endMatchBtn" class="action-btn danger">Завершить</button>
                </div>
              </div>
            </div>
            <!-- СУДЬЯ: СТАТИСТИКА ТЕКУЩЕГО МАТЧА -->
            <div class="page" id="page-stats">
              <div class="card">
                <h3>📊 Статистика текущего матча</h3>
                <div class="stat-table-wrap" id="currentStatsContainer">Нет данных</div>
              </div>
            </div>
            <!-- ЗРИТЕЛЬ: ТРАНСЛЯЦИЯ -->
            <div class="page" id="page-broadcast" style="align-items:center; justify-content:center;">
              <div class="card" style="text-align:center;">
                <h3>📺 Онлайн трансляция</h3>
                <div id="broadcastContent" style="font-size:2rem;">
                </div>
              </div>
            </div>
            <!-- ЗРИТЕЛЬ: АРХИВ -->
            <div class="page" id="page-history">
              <div class="card">
                <h3>📋 Архив матчей</h3>
                <input class="search-input" id="historySearch" placeholder="🔍 Поиск по имени или турниру...">
                  <div id="historyList">
                  </div>
                </div>
              </div>
              <!-- ЗРИТЕЛЬ: ТУРНИРЫ -->
              <div class="page" id="page-tournaments">
                <div class="card">
                  <h3>🏆 Турниры</h3>
                  <input class="search-input" id="tournamentSearch" placeholder="🔍 Найти турнир...">
                    <div id="tournamentList">
                    </div>
                    <div id="tournamentDetail" style="display:none;">
                      <button id="backToTournamentList" class="action-btn" style="margin-bottom:12px;">↩️ К списку</button>
                      <h4 id="detailTournamentName">
                      </h4>
                      <div id="tournamentMatches">
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <script>
(() => {
  const q = s => document.querySelector(s), qa = s => document.querySelectorAll(s);
  let currentRole = null; // 'judge' | 'spectator'
  let currentMatch = null;
  let tournaments = [];

  // ========== ДАННЫЕ ==========
  function loadData() {
    let raw = localStorage.getItem('tennisTournaments');
    if (raw) {
      tournaments = JSON.parse(raw);
    } else {
      const oldHistory = JSON.parse(localStorage.getItem('tennisMatchHistory') || '[]');
      if (oldHistory.length > 0) {
        tournaments = [{ id: 'legacy', name: 'Архив (старое)', matches: oldHistory }];
      } else {
        tournaments = [];
      }
      saveData();
    }
  }
  function saveData() {
    localStorage.setItem('tennisTournaments', JSON.stringify(tournaments));
  }

  function getOrCreateTournament(name) {
    let t = tournaments.find(tr => tr.name.toLowerCase() === name.toLowerCase());
    if (!t) {
      t = { id: Date.now().toString(36) + Math.random().toString(36).slice(2,6), name, matches: [] };
      tournaments.push(t);
      saveData();
    }
    return t;
  }

  function resetMatchState() {
    currentMatch = {
      id: Date.now().toString(36),
      mode: 'single',
      tournament: 'Турнир',
      names: { left1:'', left2:'', right1:'', right2:'' },
      tossWinner: null, tossChoice: null,
      serveTeam: null, servePlayerIdx: 0,
      lastServeIdxLeft: -1, lastServeIdxRight: -1,
      setsL: 0, setsR: 0, gamesL: 0, gamesR: 0,
      pointsL: 0, pointsR: 0, tieL: 0, tieR: 0,
      tieActive: false, matchWinner: null,
      targetSets: 3,
      stats: {
        left1: zeroStat(), left2: zeroStat(), right1: zeroStat(), right2: zeroStat()
      }
    };
  }
  const zeroStat = () => ({ firstIn:0, firstTot:0, secondWon:0, secondTot:0, winners:0, forced:0, unforced:0, points:0 });

  // ========== НАВИГАЦИЯ ==========
  function buildNav(role) {
    const nav = q("#mainNav");
    nav.innerHTML = '';
    let tabs = [];
    if (role === 'judge') {
      tabs = [
        { page: 'match', label: '🎾 Матч' },
        { page: 'stats', label: '📊 Статистика' },
        { page: 'broadcast', label: '📺 Трансляция' },
        { page: 'history', label: '📋 Архив' },
        { page: 'tournaments', label: '🏆 Турниры' }
      ];
    } else {
      tabs = [
        { page: 'broadcast', label: '📺 Трансляция' },
        { page: 'history', label: '📋 Архив' },
        { page: 'tournaments', label: '🏆 Турниры' }
      ];
    }
    tabs.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'nav-tab';
      btn.dataset.page = t.page;
      btn.textContent = t.label;
      btn.addEventListener('click', () => showPage(t.page));
      nav.appendChild(btn);
    });
    nav.style.display = 'flex';
  }

  function showPage(pageId, pushState = true) {
    qa('.page').forEach(p => p.classList.remove('active'));
    const page = q(`#page-${pageId}`);
    if (page) page.classList.add('active');

    qa('.nav-tab').forEach(t => t.classList.remove('active'));
    const activeTab = q(`.nav-tab[data-page="${pageId}"]`);
    if (activeTab) activeTab.classList.add('active');

    if (pageId === 'stats') renderCurrentStats();
    if (pageId === 'broadcast') updateBroadcast();
    if (pageId === 'history') renderHistory();
    if (pageId === 'tournaments') renderTournaments();
    if (pageId === 'toss') updateTossUI();
    if (pageId === 'setup') renderSetupPlayers();

    q("#appContainer").scrollTop = 0;
    window.scrollTo(0,0);
  }

  function setRole(role) {
    currentRole = role;
    buildNav(role);
    if (role === 'judge') {
      showPage('setup');
    } else {
      showPage('broadcast');
    }
  }

  // ========== ВЫБОР РОЛИ ==========
  q("#btnJudge").addEventListener('click', () => setRole('judge'));
  q("#btnSpectator").addEventListener('click', () => setRole('spectator'));
  q("#backToRoleFromSetup").addEventListener('click', () => {
    currentRole = null;
    q("#mainNav").style.display = 'none';
    showPage('role');
  });

  // ========== СУДЬЯ: НАСТРОЙКА ==========
  function renderSetupPlayers() {
    const mode = q("#setupMode")?.value || 'single';
    const container = q("#setupPlayers");
    if (!container) return;
    let html = '';
    if (mode === 'single') {
      html = '<input id="sLeft1" class="name-input" placeholder="Игрок 1"><input id="sRight1" class="name-input" placeholder="Игрок 2">';
    } else if (mode === 'double') {
      html = '<input id="sLeft1" class="name-input" placeholder="Игрок 1 (команда)"><input id="sLeft2" class="name-input" placeholder="Игрок 2 (команда)"><input id="sRight1" class="name-input" placeholder="Игрок 1 (команда)"><input id="sRight2" class="name-input" placeholder="Игрок 2 (команда)">';
    } else {
      html = '<input id="sLeft1" class="name-input" placeholder="Профессионал"><input id="sLeft2" class="name-input" placeholder="Любитель"><input id="sRight1" class="name-input" placeholder="Профессионал"><input id="sRight2" class="name-input" placeholder="Любитель">';
    }
    container.innerHTML = html;
  }
  q("#setupMode")?.addEventListener('change', renderSetupPlayers);
  renderSetupPlayers();

  q("#startSetupBtn")?.addEventListener('click', () => {
    const mode = q("#setupMode").value;
    const tournament = q("#setupTournament").value.trim() || 'Турнир';
    const getVal = id => q(`#${id}`)?.value.trim() || '';
    resetMatchState();
    currentMatch.mode = mode;
    currentMatch.tournament = tournament;
    currentMatch.names.left1 = getVal('sLeft1') || (mode==='proam'?'Про':'Игрок 1');
    currentMatch.names.left2 = getVal('sLeft2') || (mode==='proam'?'Люб':'');
    currentMatch.names.right1 = getVal('sRight1') || (mode==='proam'?'Про':'Игрок 2');
    currentMatch.names.right2 = getVal('sRight2') || (mode==='proam'?'Люб':'');
    if (mode === 'single') {
      currentMatch.names.left2 = ''; currentMatch.names.right2 = '';
    }
    currentMatch.targetSets = mode === 'single' ? 3 : (mode === 'double' ? 2 : 1);
    showPage('toss');
  });

  // ========== ЖРЕБИЙ ==========
  function updateTossUI() {
    if (!currentMatch) return;
    const lName = formatTeamName('left', currentMatch);
    const rName = formatTeamName('right', currentMatch);
    if (q("#tossLeftBtn")) q("#tossLeftBtn").textContent = `👈 ${lName}`;
    if (q("#tossRightBtn")) q("#tossRightBtn").textContent = `👉 ${rName}`;
    if (q("#coinContainer")) q("#coinContainer").style.background = 'linear-gradient(145deg,#ffd700,#e6c200)';
    if (q("#tossResultText")) q("#tossResultText").textContent = 'Нажмите на монету или выберите сторону';
    if (q("#tossChoicePanel")) q("#tossChoicePanel").style.display = 'none';
    if (q("#startMatchBtn")) q("#startMatchBtn").style.display = 'none';
    if (q("#playerChoicePanel")) q("#playerChoicePanel").innerHTML = '';
  }

  function flipCoin() {
    const coin = q("#coinContainer");
    const resultText = q("#tossResultText");
    if (!coin || !resultText || !currentMatch) return;
    coin.style.transition = 'transform 0.8s';
    coin.style.transform = 'rotateY(720deg)';
    setTimeout(() => {
      const side = Math.random() < 0.5 ? 'left' : 'right';
      coin.style.transform = 'rotateY(0deg)';
      resultText.textContent = `Выпало: ${formatTeamName(side, currentMatch)}`;
      selectTossWinner(side);
    }, 800);
  }
  q("#coinContainer")?.addEventListener('click', flipCoin);
  q("#tossLeftBtn")?.addEventListener('click', () => selectTossWinner('left'));
  q("#tossRightBtn")?.addEventListener('click', () => selectTossWinner('right'));

  function selectTossWinner(side) {
    if (!currentMatch) return;
    currentMatch.tossWinner = side;
    if (q("#tossChoicePanel")) q("#tossChoicePanel").style.display = 'block';
    if (q("#tossManual")) q("#tossManual").style.display = 'none';
    if (q("#tossResultText")) q("#tossResultText").textContent = `${formatTeamName(side, currentMatch)} выбирает:`;
    q("#choiceServeBtn").onclick = () => finalizeTossChoice('serve');
    q("#choiceReceiveBtn").onclick = () => finalizeTossChoice('receive');
    q("#choiceSideBtn").onclick = () => finalizeTossChoice('side');
  }

  function finalizeTossChoice(choice) {
    if (!currentMatch) return;
    currentMatch.tossChoice = choice;
    if (choice === 'serve') currentMatch.serveTeam = currentMatch.tossWinner;
    else if (choice === 'receive') currentMatch.serveTeam = currentMatch.tossWinner === 'left' ? 'right' : 'left';
    else currentMatch.serveTeam = currentMatch.tossWinner;

    const panel = q("#playerChoicePanel");
    if (currentMatch.mode === 'double' && panel) {
      const teamSide = currentMatch.serveTeam;
      const players = teamSide === 'left' ? [currentMatch.names.left1, currentMatch.names.left2] : [currentMatch.names.right1, currentMatch.names.right2];
      panel.style.display = 'block';
      panel.innerHTML = '<p>Кто подаёт первым?</p>';
      players.forEach((name, idx) => {
        const btn = document.createElement('button');
        btn.className = 'action-btn';
        btn.textContent = name;
        btn.style.margin = '4px';
        btn.onclick = () => {
          currentMatch.servePlayerIdx = idx;
          panel.innerHTML = `<p>Подающий: ${name}</p>`;
          if (q("#startMatchBtn")) q("#startMatchBtn").style.display = 'inline-block';
        };
        panel.appendChild(btn);
      });
    } else {
      currentMatch.servePlayerIdx = 0;
      if (q("#startMatchBtn")) q("#startMatchBtn").style.display = 'inline-block';
    }
    if (q("#choiceServeBtn")) q("#choiceServeBtn").style.display = 'none';
    if (q("#choiceReceiveBtn")) q("#choiceReceiveBtn").style.display = 'none';
    if (q("#choiceSideBtn")) q("#choiceSideBtn").style.display = 'none';
  }

  q("#startMatchBtn")?.addEventListener('click', () => {
    updateMatchUI();
    showPage('match');
  });
  q("#backToSetupBtn")?.addEventListener('click', () => showPage('setup'));

  function formatTeamName(side, match = currentMatch) {
    if (!match) return '';
    const n = match.names;
    if (match.mode === 'single') return side === 'left' ? n.left1 : n.right1;
    if (match.mode === 'proam') return side === 'left' ? `${n.left1}/${n.left2}` : `${n.right1}/${n.right2}`;
    return side === 'left' ? `${n.left1} / ${n.left2}` : `${n.right1} / ${n.right2}`;
  }

  // ========== МАТЧ ==========
  function getPointsDisplay(m = currentMatch) {
    if (!m) return { left:'0', right:'0' };
    if (m.mode === 'proam' && m.tieActive) return { left: `${m.tieL}`, right: `${m.tieR}` };
    let l = m.pointsL, r = m.pointsR;
    if (l >= 3 && r >= 3 && l === r) return { left: "40", right: "40" };
    if (l >= 3 && r >= 3 && Math.abs(l - r) === 1) return l > r ? { left: "AD", right: "40" } : { left: "40", right: "AD" };
    const map = {0:"0",1:"15",2:"30",3:"40"};
    return { left: map[l] ?? l, right: map[r] ?? r };
  }

  function updateMatchUI() {
    if (!currentMatch) return;
    const pts = getPointsDisplay();
    q("#matchLeftSets").textContent = currentMatch.setsL;
    q("#matchRightSets").textContent = currentMatch.setsR;
    q("#matchLeftGames").textContent = currentMatch.gamesL;
    q("#matchRightGames").textContent = currentMatch.gamesR;
    q("#matchLeftPoints").textContent = pts.left;
    q("#matchRightPoints").textContent = pts.right;
    const serveDot = '<span class="serve-dot"></span>';
    const leftName = formatTeamName('left') + (currentMatch.serveTeam === 'left' ? serveDot : '');
    const rightName = formatTeamName('right') + (currentMatch.serveTeam === 'right' ? serveDot : '');
    q("#matchLeftName").innerHTML = leftName;
    q("#matchRightName").innerHTML = rightName;
    q("#matchTournamentDisplay").textContent = currentMatch.tournament;
    let status = '';
    if (currentMatch.matchWinner) {
      status = `🏆 Победитель: ${formatTeamName(currentMatch.matchWinner)}`;
    } else if (currentMatch.mode === 'proam') {
      status = `⭐ Pro-Am: ${currentMatch.gamesL}:${currentMatch.gamesR} ${currentMatch.tieActive ? '(тай-брейк)' : ''}`;
    } else {
      status = `Сеты: ${currentMatch.setsL}:${currentMatch.setsR} (до ${currentMatch.targetSets})`;
    }
    q("#matchStatusText").textContent = status;
    localStorage.setItem('tennisLive', JSON.stringify({
      tournament: currentMatch.tournament,
      leftName: formatTeamName('left'),
      rightName: formatTeamName('right'),
      setsL: currentMatch.setsL, setsR: currentMatch.setsR,
      gamesL: currentMatch.gamesL, gamesR: currentMatch.gamesR,
      points: pts,
      serveTeam: currentMatch.serveTeam,
      matchWinner: currentMatch.matchWinner
    }));
  }

  function updateBroadcast() {
    const d = JSON.parse(localStorage.getItem('tennisLive') || '{}');
    if (!d.leftName) { q("#broadcastContent").innerHTML = '<p>Нет активного матча</p>'; return; }
    q("#broadcastContent").innerHTML = `
      <h2>${d.tournament}</h2>
      <div style="display:flex; justify-content:center; gap:30px; font-size:2.4rem; font-weight:700;">
        <div>${d.leftName}<br>${d.points.left}</div>
        <div>:</div>
        <div>${d.rightName}<br>${d.points.right}</div>
      </div>
      <div style="margin-top:10px;">Сеты: ${d.setsL}:${d.setsR} | Геймы: ${d.gamesL}:${d.gamesR}</div>
    `;
  }

  function addPoint(side) {
    if (!currentMatch || currentMatch.matchWinner) return;
    if (currentMatch.mode === 'proam' && currentMatch.tieActive) {
      if (side === 'left') currentMatch.tieL++; else currentMatch.tieR++;
      if (checkTieWin()) return;
      updateMatchUI(); return;
    }
    if (side === 'left') currentMatch.pointsL++; else currentMatch.pointsR++;
    let gw = checkGameWin();
    if (gw) awardGame(gw);
    else updateMatchUI();
  }

  function checkGameWin() {
    const l = currentMatch.pointsL, r = currentMatch.pointsR;
    if (l >= 4 && l - r >= 2) return 'left';
    if (r >= 4 && r - l >= 2) return 'right';
    return null;
  }

  function awardGame(winner) {
    if (winner === 'left') currentMatch.gamesL++; else currentMatch.gamesR++;
    currentMatch.pointsL = currentMatch.pointsR = 0;
    if (!(currentMatch.mode === 'proam' && currentMatch.tieActive)) switchServeTeam();
    if (currentMatch.mode === 'proam') checkProAmSet();
    else checkSet();
    updateMatchUI();
  }

  function switchServeTeam() {
    currentMatch.serveTeam = currentMatch.serveTeam === 'left' ? 'right' : 'left';
    if (currentMatch.serveTeam === 'left') {
      currentMatch.servePlayerIdx = currentMatch.lastServeIdxLeft === -1 ? 0 : (currentMatch.lastServeIdxLeft === 0 ? 1 : 0);
    } else {
      currentMatch.servePlayerIdx = currentMatch.lastServeIdxRight === -1 ? 0 : (currentMatch.lastServeIdxRight === 0 ? 1 : 0);
    }
  }

  function checkSet() {
    const gL = currentMatch.gamesL, gR = currentMatch.gamesR;
    let sw = null;
    if ((gL >= 6 && gL - gR >= 2) || (gL === 7 && gR === 5) || (gL === 7 && gR === 6)) sw = 'left';
    else if ((gR >= 6 && gR - gL >= 2) || (gR === 7 && gL === 5) || (gR === 7 && gL === 6)) sw = 'right';
    if (sw) {
      if (sw === 'left') currentMatch.setsL++; else currentMatch.setsR++;
      currentMatch.gamesL = currentMatch.gamesR = 0;
      if (currentMatch.setsL >= currentMatch.targetSets) currentMatch.matchWinner = 'left';
      else if (currentMatch.setsR >= currentMatch.targetSets) currentMatch.matchWinner = 'right';
    }
  }

  function checkProAmSet() {
    if (currentMatch.tieActive) return;
    const gL = currentMatch.gamesL, gR = currentMatch.gamesR;
    if ((gL >= 8 || gR >= 8) && Math.abs(gL - gR) >= 2) {
      currentMatch.matchWinner = gL > gR ? 'left' : 'right';
      return;
    }
    if (gL === 8 && gR === 8) {
      currentMatch.tieActive = true;
      currentMatch.tieL = currentMatch.tieR = 0;
    }
  }

  function checkTieWin() {
    if ((currentMatch.tieL >= 7 || currentMatch.tieR >= 7) && Math.abs(currentMatch.tieL - currentMatch.tieR) >= 2) {
      currentMatch.matchWinner = currentMatch.tieL > currentMatch.tieR ? 'left' : 'right';
      currentMatch.tieActive = false;
      updateMatchUI();
      return true;
    }
    return false;
  }

  // ========== УЛУЧШЕННОЕ МЕНЮ ВЫИГРЫША ОЧКА ==========
  function showPointMenu(winnerSide) {
    if (!currentMatch || currentMatch.matchWinner || currentRole !== 'judge') return;
    const isServer = currentMatch.serveTeam === winnerSide;
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.maxWidth = '460px';
    modal.innerHTML = `<strong style="font-size:1.2rem; text-align:center;">${formatTeamName(winnerSide)} выиграл очко</strong>`;
    const addBtn = (text, cls, action) => {
      const btn = document.createElement('button');
      btn.innerHTML = text;
      btn.className = cls || '';
      btn.onclick = (e) => {
        e.stopPropagation();
        document.body.removeChild(overlay);
        action();
      };
      modal.appendChild(btn);
    };
    if (isServer) {
      addBtn('🎯 Эйс (первая подача)', 'primary', () => recordStat('ace', winnerSide, 'first'));
      addBtn('🎯 Эйс (вторая подача)', '', () => recordStat('ace', winnerSide, 'second'));
      addBtn('⚡ Виннер', 'primary', () => recordStat('winner', winnerSide));
      addBtn('😓 Вынужденная ошибка соперника', '', () => recordStat('forcedOpp', winnerSide));
      addBtn('💔 Невынужденная ошибка соперника', '', () => recordStat('unforcedOpp', winnerSide));
    } else {
      addBtn('💥 Двойная ошибка подающего', 'primary', () => recordStat('doubleFault', winnerSide));
      addBtn('⚡ Виннер', 'primary', () => recordStat('winner', winnerSide));
      addBtn('😓 Вынужденная ошибка соперника', '', () => recordStat('forcedOpp', winnerSide));
      addBtn('💔 Невынужденная ошибка соперника', '', () => recordStat('unforcedOpp', winnerSide));
    }
    addBtn('➕ Просто очко (без стат.)', 'success', () => addPoint(winnerSide));
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) document.body.removeChild(overlay);
    });
  }

  function recordStat(type, winnerSide, serveType) {
    if (!currentMatch) return;
    const serverKey = currentMatch.serveTeam === 'left'
      ? (currentMatch.servePlayerIdx === 0 ? 'left1' : 'left2')
      : (currentMatch.servePlayerIdx === 0 ? 'right1' : 'right2');
    const oppKey = winnerSide === 'left' ? 'right1' : 'left1';
    const winnerKey = winnerSide === 'left' ? 'left1' : 'right1';
    if (type === 'ace') {
      currentMatch.stats[serverKey].firstTot++;
      if (serveType === 'first') currentMatch.stats[serverKey].firstIn++;
      else currentMatch.stats[serverKey].secondTot++;
      currentMatch.stats[serverKey].points++;
    } else if (type === 'winner') {
      currentMatch.stats[winnerKey].winners++;
      currentMatch.stats[winnerKey].points++;
    } else if (type === 'forcedOpp') {
      currentMatch.stats[oppKey].forced++;
      currentMatch.stats[winnerKey].points++;
    } else if (type === 'unforcedOpp') {
      currentMatch.stats[oppKey].unforced++;
      currentMatch.stats[winnerKey].points++;
    } else if (type === 'doubleFault') {
      currentMatch.stats[serverKey].firstTot++;
      currentMatch.stats[serverKey].secondTot++;
      currentMatch.stats[winnerKey].points++;
    }
    addPoint(winnerSide);
  }

  q("#matchLeftHalf")?.addEventListener('click', () => showPointMenu('left'));
  q("#matchRightHalf")?.addEventListener('click', () => showPointMenu('right'));

  q("#endMatchBtn")?.addEventListener('click', () => {
    if (!currentMatch) return;
    if (!currentMatch.matchWinner && !confirm('Матч ещё не закончен. Завершить принудительно?')) return;
    const finished = JSON.parse(JSON.stringify(currentMatch));
    finished.finishedAt = new Date().toISOString();
    const tournament = getOrCreateTournament(currentMatch.tournament);
    tournament.matches.push(finished);
    saveData();
    alert('Матч сохранён в турнир и архив.');
    resetMatchState();
    updateMatchUI();
    showPage('setup');
  });
  q("#abortMatchBtn")?.addEventListener('click', () => {
    if (confirm('Прервать матч без сохранения?')) {
      resetMatchState();
      showPage('setup');
    }
  });

  // ========== СТАТИСТИКА (общая функция) ==========
  function renderStatsTable(match) {
    const players = [];
    const m = match;
    if (m.mode === 'single') {
      players.push({label: m.names.left1, key:'left1'}, {label: m.names.right1, key:'right1'});
    } else if (m.mode === 'double') {
      players.push({label: m.names.left1, key:'left1'},{label: m.names.left2, key:'left2'},
                   {label: m.names.right1, key:'right1'},{label: m.names.right2, key:'right2'});
    } else {
      players.push({label: `${m.names.left1} (Про)`, key:'left1'},{label: `${m.names.left2} (Люб)`, key:'left2'},
                   {label: `${m.names.right1} (Про)`, key:'right1'},{label: `${m.names.right2} (Люб)`, key:'right2'});
    }
    let html = '<div class="stat-table-wrap"><table><tr><th>Игрок</th><th>Очки</th><th>1-я подача</th><th>Виннеры</th><th>Вын.ош.</th><th>Невын.ош.</th></tr>';
    players.forEach(p => {
      const s = m.stats[p.key];
      const first = s.firstTot ? `${s.firstIn}/${s.firstTot} (${(s.firstIn*100/s.firstTot).toFixed(0)}%)` : '—';
      html += `<tr><td>${p.label}</td><td>${s.points}</td><td>${first}</td><td>${s.winners}</td><td>${s.forced}</td><td>${s.unforced}</td></tr>`;
    });
    html += '</table></div>';
    return html;
  }

  function renderCurrentStats() {
    if (!currentMatch) { q("#currentStatsContainer").innerHTML = 'Нет активного матча'; return; }
    q("#currentStatsContainer").innerHTML = renderStatsTable(currentMatch);
  }

  // ========== АРХИВ ==========
  function renderHistory(filter = '') {
    const container = q("#historyList");
    if (!container) return;
    const allMatches = tournaments.flatMap(t => t.matches.map(m => ({...m, tournamentName: t.name})));
    allMatches.sort((a,b) => new Date(b.finishedAt||0) - new Date(a.finishedAt||0));
    const filtered = allMatches.filter(m => {
      if (!filter) return true;
      const qs = filter.toLowerCase();
      return (m.tournamentName?.toLowerCase().includes(qs)) ||
             (m.names.left1?.toLowerCase().includes(qs)) ||
             (m.names.right1?.toLowerCase().includes(qs));
    });
    if (filtered.length === 0) { container.innerHTML = '<p>Ничего не найдено</p>'; return; }
    let html = '';
    filtered.forEach(m => {
      html += `<div class="list-item" onclick="window.viewArchivedMatch('${m.id}')">
        <strong>${m.tournamentName || m.tournament}</strong> | ${formatTeamName('left',m)} vs ${formatTeamName('right',m)} | ${m.setsL}:${m.setsR} | ${new Date(m.finishedAt).toLocaleString()}
      </div>`;
    });
    container.innerHTML = html;
  }
  q("#historySearch")?.addEventListener('input', e => renderHistory(e.target.value));
  window.viewArchivedMatch = function(matchId) {
    const match = tournaments.flatMap(t => t.matches).find(m => m.id === matchId);
    if (!match) return alert('Матч не найден');
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.maxWidth = '640px';
    modal.innerHTML = `<h3>📊 Статистика матча</h3><p><strong>${match.tournament}</strong> — ${formatTeamName('left',match)} vs ${formatTeamName('right',match)} (${match.setsL}:${match.setsR})</p>`;
    modal.innerHTML += renderStatsTable(match);
    const closeBtn = document.createElement('button');
    closeBtn.textContent = 'Закрыть';
    closeBtn.className = 'action-btn';
    closeBtn.onclick = () => document.body.removeChild(overlay);
    modal.appendChild(closeBtn);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) document.body.removeChild(overlay); });
  };

  // ========== ТУРНИРЫ ==========
  function renderTournaments(filter = '') {
    const container = q("#tournamentList");
    const detail = q("#tournamentDetail");
    if (detail) detail.style.display = 'none';
    if (!container) return;
    let filtered = tournaments;
    if (filter) {
      const qs = filter.toLowerCase();
      filtered = tournaments.filter(t => t.name.toLowerCase().includes(qs));
    }
    if (filtered.length === 0) { container.innerHTML = '<p>Турниры не найдены</p>'; return; }
    let html = '';
    filtered.forEach(t => {
      html += `<div class="list-item" onclick="window.openTournament('${t.id}')">
        <strong>🏆 ${t.name}</strong> — матчей: ${t.matches.length}
      </div>`;
    });
    container.innerHTML = html;
  }
  q("#tournamentSearch")?.addEventListener('input', e => renderTournaments(e.target.value));
  window.openTournament = function(tournamentId) {
    const t = tournaments.find(tr => tr.id === tournamentId);
    if (!t) return;
    q("#tournamentList").style.display = 'none';
    q("#tournamentDetail").style.display = 'block';
    q("#detailTournamentName").textContent = `🏆 ${t.name}`;
    const matchContainer = q("#tournamentMatches");
    if (t.matches.length === 0) {
      matchContainer.innerHTML = '<p>Нет матчей в этом турнире.</p>';
    } else {
      let html = '';
      t.matches.sort((a,b) => new Date(b.finishedAt||0) - new Date(a.finishedAt||0));
      t.matches.forEach(m => {
        html += `<div class="list-item" onclick="window.viewArchivedMatch('${m.id}')">
          ${formatTeamName('left',m)} vs ${formatTeamName('right',m)} | ${m.setsL}:${m.setsR} | ${new Date(m.finishedAt).toLocaleString()}
        </div>`;
      });
      matchContainer.innerHTML = html;
    }
  };
  q("#backToTournamentList")?.addEventListener('click', () => {
    q("#tournamentList").style.display = 'block';
    q("#tournamentDetail").style.display = 'none';
  });

  // ========== ФИКС ПРОКРУТКИ ПРИ ФОКУСЕ ==========
  document.addEventListener('focusin', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') {
      setTimeout(() => { if (window.scrollY !== 0) window.scrollTo(0,0); }, 50);
    }
  });

  // ========== ИНИЦИАЛИЗАЦИЯ ==========
  loadData();
  resetMatchState();
  // Показываем выбор роли
  q("#mainNav").style.display = 'none';
  showPage('role', false);
  // Обработчики для смены роли, если вручную перейдут по навигации (уже есть)
})();
</script>
